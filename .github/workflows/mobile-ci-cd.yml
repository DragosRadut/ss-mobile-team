name: Mobile CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─────────────────────────────────────────
  # 1. Analiză statică (Lint)
  # ─────────────────────────────────────────
  lint:
    name: Static Analysis (Lint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Lint
        run: ./gradlew lint

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

  # ─────────────────────────────────────────
  # 2. Unit Tests
  # ─────────────────────────────────────────
  unit_tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint          # rulează DUPĂ lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test

      - name: Upload Unit Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-report
          path: app/build/reports/tests/

  # ─────────────────────────────────────────
  # 3. Teste instrumentate (pe emulator)
  # ─────────────────────────────────────────
  instrumented_tests:
    name: Run Instrumented Tests
    runs-on: ubuntu-latest
    needs: unit_tests     # rulează DUPĂ unit tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Activează KVM pentru accelerare hardware a emulatorului
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: ./gradlew connectedAndroidTest

      - name: Upload Instrumented Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-report
          path: app/build/reports/androidTests/

  # ─────────────────────────────────────────
  # 4. Build APK
  # ─────────────────────────────────────────
  build_apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: instrumented_tests   # rulează DUPĂ toate testele

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      # Salvează APK-ul ca artifact pentru job-ul următor
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

  # ─────────────────────────────────────────
  # 5. Publicare APK în GitHub Releases
  # ─────────────────────────────────────────
  release:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build_apk
    # Publică release DOAR pe push direct pe main (nu pe PR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: apk/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release Build #${{ github.run_number }}"
          body: |
            Automated release generated by CI/CD pipeline.
            Commit: ${{ github.sha }}
          files: apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}